name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            out="clautinue-${target}"
            bun build src/index.ts --compile --target="bun-${target}" --outfile="dist/${out}"
            tar -czf "dist/${out}.tar.gz" -C dist "${out}"
            rm "dist/${out}"
          done

      - name: Compute SHA256 sums
        id: sha
        run: |
          set -euo pipefail
          cd dist
          for f in clautinue-*.tar.gz; do
            name="${f%.tar.gz}"
            sum="$(shasum -a 256 "$f" | cut -d' ' -f1)"
            echo "${name}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            dist/clautinue-*.tar.gz \
            --title "v${{ steps.ver.outputs.version }}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
          DARWIN_ARM64_SHA: ${{ steps.sha.outputs.clautinue-darwin-arm64 }}
          DARWIN_X64_SHA: ${{ steps.sha.outputs.clautinue-darwin-x64 }}
          LINUX_ARM64_SHA: ${{ steps.sha.outputs.clautinue-linux-arm64 }}
          LINUX_X64_SHA: ${{ steps.sha.outputs.clautinue-linux-x64 }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/yscheef/homebrew-tap.git" tap
          cd tap

          cat > Formula/clautinue.rb <<EOF
          class Clautinue < Formula
            desc "Browse and resume Claude Code sessions from anywhere"
            homepage "https://github.com/yscheef/clautinue"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yscheef/clautinue/releases/download/v${VERSION}/clautinue-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                url "https://github.com/yscheef/clautinue/releases/download/v${VERSION}/clautinue-darwin-x64.tar.gz"
                sha256 "${DARWIN_X64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/yscheef/clautinue/releases/download/v${VERSION}/clautinue-linux-arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                url "https://github.com/yscheef/clautinue/releases/download/v${VERSION}/clautinue-linux-x64.tar.gz"
                sha256 "${LINUX_X64_SHA}"
              end
            end

            def install
              cpu = Hardware::CPU.arm? ? "arm64" : "x64"
              os = OS.mac? ? "darwin" : "linux"
              bin.install "clautinue-#{os}-#{cpu}" => "clautinue"
            end

            test do
              assert_match "No sessions found", shell_output("#{bin}/clautinue --project __nonexistent__ 2>&1")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/clautinue.rb
          git commit -m "clautinue ${VERSION}"
          git push
